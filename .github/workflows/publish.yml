name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "SemVer tag to publish (vMAJOR.MINOR.PATCH)"
        required: true
        type: string

jobs:
  publish:
    name: Publish kub-cli
    if: github.repository == 'feelpp/kub-cli'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce official Feel++ repository
        run: |
          if [ "${GITHUB_REPOSITORY}" != "feelpp/kub-cli" ]; then
            echo "Publishing is only allowed from feelpp/kub-cli."
            exit 2
          fi

      - name: Validate SemVer and pyproject version
        run: |
          TAG_VALUE="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"
          python scripts/validate_release_tag.py --tag "${TAG_VALUE}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Generate publish summary
        if: always()
        run: |
          echo "## PyPI Publication Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Package: kub-cli" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Repository: ${GITHUB_REPOSITORY}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Project URL: https://pypi.org/project/kub-cli/" >> "${GITHUB_STEP_SUMMARY}"
