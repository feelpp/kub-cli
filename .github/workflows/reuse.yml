name: REUSE Compliance Check

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "antora-playbook.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "antora-playbook.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: REUSE Compliance Check
        run: ./scripts/reuse-lint.sh
